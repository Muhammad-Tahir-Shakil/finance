<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — FinTrack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo" onclick="location.href='../index.html'">
        <div class="logo-icon"><i class="fa-solid fa-chart-line"></i></div>
        <div class="logo-text">Fin<span>Track</span></div>
      </div>

      <h1>Welcome back</h1>
      <p class="auth-sub">Log in to continue tracking your finances.</p>

      <form onsubmit="handleLogin(event)">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>
        <p class="form-error" id="formError"></p>
        <button type="submit" class="btn-block">Log In</button>
      </form>

      <p class="auth-foot">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
  </div>

  <script src="../js/storage.js"></script>
  <script src="../js/auth.js"></script>
</body>
</html>
